name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Fetch laws from RIS
        run: node scripts/fetch-laws.js

      - name: Parse laws into JSON
        run: node scripts/parse-laws.js

      - name: Generate HTML pages
        run: node scripts/generate-pages.js

      - name: Build with Vite
        run: npm run build

      - name: Index with Pagefind
        run: npx pagefind --site dist --force-language de

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.js

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: |
            e2e/screenshots/
            e2e/test-results/
          retention-days: 14

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

      - uses: actions/deploy-pages@v4
        id: deployment
